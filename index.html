<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Al Qasim Initiative</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Lato:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green-light: #7BC898;
      --green-mid: #50A06A;
      --green-dark: #2E7A4A;
      --green-glow: #96D8AD;
      --bg: #080808;
      --bg-card: rgba(255,255,255,0.04);
      --bg-card-hover: rgba(255,255,255,0.08);
      --text: #E8F2EC;
      --text-muted: #6B9178;
    }

    html, body {
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: "Lato", sans-serif;
      font-weight: 300;
    }

    body {
      background:
        radial-gradient(ellipse 80% 60% at 50% -10%, rgba(50,140,80,0.16) 0%, transparent 70%),
        radial-gradient(ellipse 40% 40% at 80% 80%, rgba(30,100,55,0.10) 0%, transparent 60%),
        #080808;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 60px 20px 80px;
    }

    .container {
      width: 100%;
      max-width: 520px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .logo-wrap {
      width: 110px;
      height: 110px;
      border-radius: 50%;
      overflow: hidden;
      border: 2px solid rgba(80,160,106,0.4);
      box-shadow: 0 0 30px rgba(80,160,106,0.22), 0 0 60px rgba(80,160,106,0.08);
      margin-bottom: 28px;
      animation: fadeDown 0.7s ease both;
    }

    .logo-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    h1 {
      font-family: "Cinzel", serif;
      font-size: 1.85rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-align: center;
      background: linear-gradient(135deg, var(--green-glow) 0%, var(--green-light) 50%, var(--green-mid) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 18px;
      animation: fadeDown 0.7s 0.1s ease both;
    }

    .divider {
      width: 60px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--green-mid), transparent);
      margin-bottom: 18px;
      animation: fadeIn 0.7s 0.2s ease both;
    }

    p.tagline {
      font-size: 0.88rem;
      line-height: 1.75;
      color: var(--text-muted);
      text-align: center;
      max-width: 420px;
      margin-bottom: 44px;
      letter-spacing: 0.02em;
      animation: fadeIn 0.7s 0.25s ease both;
    }

    .links {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .link-btn {
      display: flex;
      align-items: center;
      gap: 16px;
      width: 100%;
      padding: 16px 22px;
      background: var(--bg-card);
      border: 1px solid rgba(80,160,106,0.2);
      border-radius: 12px;
      text-decoration: none;
      color: var(--text);
      font-family: "Lato", sans-serif;
      font-weight: 400;
      font-size: 0.95rem;
      letter-spacing: 0.03em;
      cursor: pointer;
      transition: background 0.25s, border-color 0.25s, transform 0.2s, box-shadow 0.25s;
      position: relative;
      overflow: hidden;
    }

    .link-btn::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, rgba(80,160,106,0.08), transparent);
      opacity: 0;
      transition: opacity 0.25s;
    }

    .link-btn:hover {
      background: var(--bg-card-hover);
      border-color: rgba(80,160,106,0.5);
      transform: translateY(-2px);
      box-shadow: 0 6px 24px rgba(80,160,106,0.13);
    }

    .link-btn:hover::before { opacity: 1; }
    .link-btn:active { transform: translateY(0); }

    .icon {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      background: rgba(80,160,106,0.12);
      border: 1px solid rgba(80,160,106,0.25);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .icon svg {
      width: 18px;
      height: 18px;
      fill: var(--green-light);
    }

    .btn-text { flex: 1; }
    .btn-label { font-size: 0.95rem; color: var(--text); }

    .arrow {
      color: var(--green-dark);
      font-size: 1rem;
      transition: transform 0.2s, color 0.2s;
    }

    .link-btn:hover .arrow {
      transform: translateX(4px);
      color: var(--green-light);
    }

    .link-btn:nth-child(1) { animation: fadeUp 0.6s 0.35s ease both; }
    .link-btn:nth-child(2) { animation: fadeUp 0.6s 0.45s ease both; }

    footer {
      margin-top: 52px;
      font-size: 0.72rem;
      color: rgba(107,145,120,0.4);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      animation: fadeIn 1s 0.8s ease both;
    }

    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-14px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
  </style>
</head>
